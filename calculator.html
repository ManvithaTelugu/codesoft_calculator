<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #1c1c1e;
      border-radius: 20px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .display {
      text-align: right;
      padding: 10px 4px 16px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      font-size: 14px;
      color: #888;
      min-height: 20px;
      word-break: break-all;
    }

    .display .value {
      font-size: 48px;
      font-weight: 300;
      color: #fff;
      word-break: break-all;
      line-height: 1.1;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 50%;
      width: 64px;
      height: 64px;
      font-size: 20px;
      font-weight: 400;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
    }

    button:active {
      opacity: 0.7;
      transform: scale(0.95);
    }

    .btn-func {
      background: #a5a5a5;
      color: #1c1c1e;
    }

    .btn-op {
      background: #ff9f0a;
      color: #fff;
      font-size: 24px;
    }

    .btn-num {
      background: #333335;
      color: #fff;
    }

    .btn-zero {
      background: #333335;
      color: #fff;
      border-radius: 32px;
      width: 100%;
      grid-column: span 2;
      text-align: left;
      padding-left: 24px;
    }

    .btn-eq {
      background: #ff9f0a;
      color: #fff;
      font-size: 24px;
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="value" id="value">0</div>
  </div>

  <div class="buttons">
    <!-- Row 1 -->
    <button class="btn-func" onclick="pressAC()">AC</button>
    <button class="btn-func" onclick="pressSign()">+/−</button>
    <button class="btn-func" onclick="pressPercent()">%</button>
    <button class="btn-op"   onclick="pressOp('/')">÷</button>

    <!-- Row 2 -->
    <button class="btn-num" onclick="pressNum('7')">7</button>
    <button class="btn-num" onclick="pressNum('8')">8</button>
    <button class="btn-num" onclick="pressNum('9')">9</button>
    <button class="btn-op"  onclick="pressOp('*')">×</button>

    <!-- Row 3 -->
    <button class="btn-num" onclick="pressNum('4')">4</button>
    <button class="btn-num" onclick="pressNum('5')">5</button>
    <button class="btn-num" onclick="pressNum('6')">6</button>
    <button class="btn-op"  onclick="pressOp('-')">−</button>

    <!-- Row 4 -->
    <button class="btn-num" onclick="pressNum('1')">1</button>
    <button class="btn-num" onclick="pressNum('2')">2</button>
    <button class="btn-num" onclick="pressNum('3')">3</button>
    <button class="btn-op"  onclick="pressOp('+')">+</button>

    <!-- Row 5 -->
    <button class="btn-zero" onclick="pressNum('0')">0</button>
    <button class="btn-num"  onclick="pressDot()">.</button>
    <button class="btn-eq"   onclick="pressEquals()">=</button>
  </div>
</div>

<script>
  let current = '0';
  let previous = '';
  let operator = null;
  let shouldReset = false;

  const valueEl = document.getElementById('value');
  const expressionEl = document.getElementById('expression');

  function updateDisplay() {
    valueEl.textContent = current.length > 10
      ? parseFloat(current).toExponential(4)
      : current;
  }

  function pressNum(num) {
    if (shouldReset || current === '0') {
      current = num;
      shouldReset = false;
    } else {
      if (current.length >= 12) return;
      current += num;
    }
    updateDisplay();
  }

  function pressDot() {
    if (shouldReset) { current = '0.'; shouldReset = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function pressAC() {
    current = '0'; previous = ''; operator = null; shouldReset = false;
    expressionEl.textContent = '';
    updateDisplay();
  }

  function pressSign() {
    if (current !== '0')
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function pressPercent() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  function pressOp(op) {
    if (operator && !shouldReset) {
      current = String(compute(parseFloat(previous), parseFloat(current), operator));
    }
    previous = current;
    operator = op;
    const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
    expressionEl.textContent = previous + ' ' + sym;
    shouldReset = true;
    updateDisplay();
  }

  function pressEquals() {
    if (!operator) return;
    const a = parseFloat(previous);
    const b = parseFloat(current);
    const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator];
    expressionEl.textContent = previous + ' ' + sym + ' ' + current + ' =';
    const result = compute(a, b, operator);
    current = result === 'Error' ? 'Error' : String(parseFloat(result.toFixed(10)));
    operator = null; previous = ''; shouldReset = true;
    updateDisplay();
  }

  function compute(a, b, op) {
    if (op === '+') return a + b;
    if (op === '-') return a - b;
    if (op === '*') return a * b;
    if (op === '/') return b === 0 ? 'Error' : a / b;
  }

  // Keyboard support
  document.addEventListener('keydown', function(e) {
    if (e.key >= '0' && e.key <= '9') pressNum(e.key);
    else if (e.key === '.') pressDot();
    else if (e.key === '+') pressOp('+');
    else if (e.key === '-') pressOp('-');
    else if (e.key === '*') pressOp('*');
    else if (e.key === '/') { e.preventDefault(); pressOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') pressEquals();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay();
    }
    else if (e.key === 'Escape') pressAC();
  });
</script>

</body>
</html>
